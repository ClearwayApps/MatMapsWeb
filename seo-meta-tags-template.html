<!-- SEO and AI Agent Friendly Meta Tags Template -->
<!-- Add these to your HTML <head> section -->

<!-- Basic Meta Tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- SEO Meta Tags -->
<title>MatMaps - Discover & Connect Communities</title>
<meta name="description" content="MatMaps is a community platform for discovering clubs, events, and connecting with like-minded people in your area.">
<meta name="keywords" content="communities, clubs, events, local, networking, social">
<meta name="author" content="MatMaps Team">

<!-- Open Graph Meta Tags (for social media sharing and AI agents) -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://matmaps.com/">
<meta property="og:title" content="MatMaps - Discover & Connect Communities">
<meta property="og:description" content="MatMaps is a community platform for discovering clubs, events, and connecting with like-minded people.">
<meta property="og:image" content="https://matmaps.com/assets/image/og-image.png">
<meta property="og:image:alt" content="MatMaps community platform">
<meta property="og:site_name" content="MatMaps">
<meta property="og:locale" content="en_US">

<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="https://matmaps.com/">
<meta name="twitter:title" content="MatMaps - Discover & Connect Communities">
<meta name="twitter:description" content="MatMaps is a community platform for discovering clubs, events, and connecting with like-minded people.">
<meta name="twitter:image" content="https://matmaps.com/assets/image/twitter-image.png">
<meta name="twitter:creator" content="@MatMaps">

<!-- Search Engine Crawling -->
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
<meta name="googlebot" content="index, follow">
<meta name="bingbot" content="index, follow">

<!-- AI Agent Friendly Tags -->
<meta name="AI-Content-Type" content="community-platform">
<meta name="AI-Schema-Type" content="WebApplication">
<meta name="language" content="en">
<meta name="revisit-after" content="7 days">

<!-- Canonical URL (important for preventing duplicate content) -->
<link rel="canonical" href="https://matmaps.com/">

<!-- Structured Data (Schema.org) for AI understanding -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "MatMaps",
  "description": "A community platform for discovering clubs, events, and connecting with like-minded people.",
  "url": "https://matmaps.com",
  "applicationCategory": "SocialNetworking",
  "operatingSystem": "All",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "4.5",
    "ratingCount": "250"
  }
}
</script>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="assets/image/favicon.ico">
<link rel="apple-touch-icon" href="assets/image/apple-touch-icon.png">

<!-- Preconnect to external domains (for performance) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdn.example.com">

<!-- DNS Prefetch -->
<link rel="dns-prefetch" href="https://cdn.example.com">

<!-- Additional Accessibility Tags -->
<meta name="theme-color" content="#00008B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
