<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/image/matMaps_logo.png">
    <title>Support Requests Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            400: '#E63935',
                            500: '#B71C1C',
                            600: '#931A16',
                            700: '#7A1310',
                            800: '#5F0E0B',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .support-card-item:hover {
            background-color: #12131a !important;
            transition: background-color 0.2s ease-in-out;
        }
    </style>
</head>

<body id="mainBodyFramework" class="bg-gray-950 text-gray-100 font-sans antialiased hidden">

    <div class="flex h-screen overflow-hidden relative">

        <div id="sidebarOverlay"
            class="fixed inset-0 bg-black/50 z-20 hidden md:hidden transition-opacity duration-300"></div>

        <aside id="sidebarPanel"
            class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col justify-between fixed md:static inset-y-0 left-0 -translate-x-full md:translate-x-0 z-30 md:z-0 transition-transform duration-300 ease-in-out md:flex">
            <div>
                <div class="h-16 flex items-center px-6 border-b border-gray-700 justify-between md:justify-center">
                    <div class="flex items-center h-full">
                        <img src="../assets/image/matMaps_logo.png" alt="logo" class="h-8 md:h-10" />
                        <span class="text-xl font-bold text-indigo-400 ml-4">MatMaps</span>
                    </div>
                    <button id="closeSidebar" class="text-gray-400 hover:text-white md:hidden text-xl p-1">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <nav class="p-4 space-y-2">
                    <a href="dashboard.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition">
                        <i class="fa-solid fa-chart-pie w-5"></i> <span>Dashboard</span>
                    </a>
                    <a href="clubs.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-map-pin w-5"></i> <span>Clubs Manager</span>
                    </a>
                    <a href="events.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-calendar-days w-5"></i> <span>Events Manager</span>
                    </a>
                    <a href="posts-collections.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-images w-5"></i> <span>Post Collection</span>
                    </a>
                    <a href="comments.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-comments w-5"></i> <span>Comments</span>
                    </a>
                    <a href="reviews.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-star w-5"></i> <span>Reviews</span>
                    </a>
                    <a href="clubs-claims.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-passport w-5"></i> <span>Club Claims</span>
                    </a>
                    <a href="support-requests.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg bg-indigo-600 text-white transition">
                        <i class="fa-solid fa-headset w-5"></i> <span>Support Requests</span>
                    </a>
                    <a href="user-permissions.html"
                        class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-users-gear w-5"></i> <span>User Permissions</span>
                    </a>
                </nav>
            </div>
            <div class="p-4 border-t border-gray-700">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-9 h-9 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-white">
                        M</div>
                    <div>
                        <p class="text-sm font-semibold">MatMaps Test</p>
                        <p class="text-xs text-gray-500">Admin User</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">

            <header
                class="h-16 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-6 sticky top-0 z-10 shrink-0">
                <div class="flex items-center space-x-2">
                    <button id="openSidebar"
                        class="text-gray-400 hover:text-white md:hidden text-xl p-1 focus:outline-none">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <i class="fa-solid fa-headset text-indigo-400 text-lg"></i>
                    <h1 class="text-lg font-semibold">User Support Tickets</h1>
                </div>
            </header>

            <div class="py-6 px-4 md:px-8 space-y-8 w-full">

                <div
                    class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col md:flex-row gap-4 items-center justify-between shadow-sm">
                    <div id="statusTabGroup"
                        class="flex space-x-2 bg-gray-950 p-1 rounded-lg border border-gray-800 text-xs font-medium w-full md:w-auto">
                        <button data-status="pending"
                            class="tab-btn bg-indigo-600 text-white px-4 py-2 rounded-md shadow-sm transition">
                            Pending Requests <span id="pendingBadgeCount"
                                class="ml-1.5 px-1.5 py-0.5 text-[10px] bg-indigo-800 text-indigo-200 rounded-full">0</span>
                        </button>
                        <button data-status="approved"
                            class="tab-btn text-gray-400 hover:text-white px-4 py-2 rounded-md transition">
                            Resolved Requests <span id="approvedBadgeCount"
                                class="ml-1.5 px-1.5 py-0.5 text-[10px] bg-indigo-800 text-indigo-200 rounded-full">0</span>
                        </button>
                    </div>

                    <div class="flex items-center space-x-3 w-full md:w-auto justify-end">
                        <select id="sortOrder"
                            class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 text-gray-400 w-full md:w-auto">
                            <option value="desc">Sort by: Newest First</option>
                            <option value="asc">Sort by: Oldest First</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4" id="supportContainer">
                    <div class="py-16 text-center flex flex-col items-center justify-center space-y-3">
                        <div class="w-9 h-9 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin">
                        </div>
                        <p class="text-xs text-gray-500 tracking-wider">Syncing Support Desk Pipeline...</p>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-4 border-t border-gray-800 text-xs">
                    <p class="text-gray-500" id="entryCountText">Showing 0-0 of 0 entries</p>
                    <div class="flex space-x-1.5">
                        <button id="prevPageBtn"
                            class="bg-gray-900 border border-gray-800 text-gray-400 px-3 py-1.5 rounded-lg opacity-50 cursor-not-allowed">Previous</button>
                        <button id="nextPageBtn"
                            class="bg-gray-900 border border-gray-800 text-gray-300 hover:text-white px-3 py-1.5 rounded-lg transition">Next</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="./firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = window.FIREBASE_CONFIG || {};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                console.log("Welcome Admin:", user.email);
                const bodyEl = document.getElementById('mainBodyFramework');
                if (bodyEl) bodyEl.classList.remove('hidden');
            }
        });

        const supportContainer = document.getElementById('supportContainer');
        const pendingBadgeCount = document.getElementById('pendingBadgeCount');
        const approvedBadgeCount = document.getElementById('approvedBadgeCount');
        const entryCountText = document.getElementById('entryCountText');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const sortOrder = document.getElementById('sortOrder');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');

        let rawItemsList = [];
        let currentStatusFilter = 'pending';
        const itemsPerPage = 10;
        let currentPage = 1;

        // 1. Listen to support_requests Collection Stream
        onSnapshot(collection(db, "support_requests"), (snapshot) => {
            rawItemsList = [];
            let pendingCount = 0;
            let approvedCount = 0;

            snapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const id = docSnap.id;

                // Checking standard Firestore field 'status' mapped cleanly
                let calculatedStatus = item.status || 'pending';

                if (calculatedStatus === 'pending') pendingCount++;
                if (calculatedStatus === 'approved') approvedCount++;

                rawItemsList.push({ id, calculatedStatus, ...item });
            });

            if (pendingBadgeCount) pendingBadgeCount.innerText = pendingCount;
            if (approvedBadgeCount) approvedBadgeCount.innerText = approvedCount;
            processAndRenderUI();
        });

        // 2. Client Side Pagination Engine Processing Pipeline
        function processAndRenderUI() {
            let processedList = rawItemsList.filter(item => item.calculatedStatus === currentStatusFilter);

            const order = sortOrder ? sortOrder.value : 'desc';
            processedList.sort((a, b) => {
                let timeA = a.createdTime ? (a.createdTime.toDate ? a.createdTime.toDate().getTime() : new Date(a.createdTime).getTime()) : 0;
                let timeB = b.createdTime ? (b.createdTime.toDate ? b.createdTime.toDate().getTime() : new Date(b.createdTime).getTime()) : 0;
                return order === 'desc' ? timeB - timeA : timeA - timeB;
            });

            const totalItems = processedList.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = processedList.slice(startIndex, endIndex);

            renderSupportList(paginatedItems, startIndex, totalItems, totalPages);
        }

        // 3. Dynamic DOM Injector Render Table Logic Pipeline
        function renderSupportList(items, startIndex, totalItems, totalPages) {
            supportContainer.innerHTML = '';

            if (items.length === 0) {
                supportContainer.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center text-gray-500 text-sm col-span-full">
                        <i class="fa-solid fa-folder-open text-2xl text-gray-700 mb-2 block"></i>
                        No support tickets found in this segment node.
                    </div>`;
                entryCountText.innerText = "Showing 0-0 of 0 entries";
                prevPageBtn.disabled = true;
                nextPageBtn.disabled = true;
                return;
            }

            entryCountText.innerText = `Showing ${startIndex + 1}-${Math.min(startIndex + itemsPerPage, totalItems)} of ${totalItems} entries`;
            prevPageBtn.disabled = (currentPage === 1);
            nextPageBtn.disabled = (currentPage === totalPages);

            items.forEach((item) => {
                let formattedTime = "N/A";
                if (item.createdTime) {
                    const dateObj = item.createdTime.toDate ? item.createdTime.toDate() : new Date(item.createdTime);
                    formattedTime = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' }) + ' • ' + dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                }

                let userRefStr = item.userRef ? (item.userRef.path || item.userRef.toString()) : "";
                const displayUserId = userRefStr ? userRefStr.split('/').pop() : "Unknown User";

                const applicantName = item.name || 'Anonymous User';
                const avatarText = applicantName.substring(0, 2).toUpperCase();
                const avatarHTML = `<div class="w-10 h-10 bg-indigo-500/10 text-indigo-400 rounded-full flex items-center justify-center font-bold text-sm shrink-0 border border-indigo-500/20 font-mono">${avatarText}</div>`;

                let actionButtonsHTML = '';
                if (item.calculatedStatus === 'pending') {
                    actionButtonsHTML = `
                        <button data-action="approve" data-id="${item.id}" class="action-btn bg-emerald-600/15 hover:bg-emerald-600 text-emerald-400 hover:text-white px-4 py-2 rounded-lg text-xs font-bold border border-emerald-500/20 transition flex items-center shadow-sm">
                            <i class="fa-solid fa-circle-check mr-1.5"></i> Mark Resolved
                        </button>`;
                } else {
                    actionButtonsHTML = `
                        <span class="text-[11px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1.5 rounded-lg font-bold flex items-center">
                            <i class="fa-solid fa-check mr-1.5"></i> Ticket Resolved
                        </span>`;
                }

                const blockNode = document.createElement('div');
                blockNode.className = "support-card-item bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4";
                blockNode.innerHTML = `
                    <div class="flex items-start space-x-4 text-left w-full">
                        ${avatarHTML}
                        <div class="w-full space-y-1">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="font-bold text-sm text-gray-200 tracking-wide">${applicantName}</span>
                                <span class="text-xs text-gray-500 font-mono" title="${userRefStr}">UID: ${displayUserId.substring(0, 6)}...</span>
                                <span class="text-xs text-gray-500 font-mono">• Generated: ${formattedTime}</span>
                            </div>
                            
                            <div class="text-xs text-indigo-400 font-medium font-mono pt-0.5">
                                <i class="fa-solid fa-envelope mr-1 text-gray-600"></i> ${item.email || 'N/A'}
                            </div>

                            <div class="bg-gray-950/40 border border-gray-800/60 rounded-xl p-3 mt-2 text-sm text-gray-300 font-light leading-relaxed">
                                ${item.message || 'No descriptive issue narrative parameter submitted.'}
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex flex-row md:flex-col items-center gap-2 w-full md:w-auto justify-end border-t border-gray-800/60 md:border-none pt-3 md:pt-0 shrink-0">
                        ${actionButtonsHTML}
                    </div>`;
                supportContainer.appendChild(blockNode);
            });

            bindCardActionListeners();
        }

        function bindCardActionListeners() {
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const docId = e.currentTarget.getAttribute('data-id');
                    const supportDocRef = doc(db, "support_requests", docId);

                    try {
                        await updateDoc(supportDocRef, { status: 'approved' });
                        alert("Support request ticket marked as resolved successfully!");
                    } catch (err) {
                        console.error("Execution failed updating request node: ", err);
                        alert("Write status execution rejected.");
                    }
                });
            });
        }

        // Tab click toggle logic bindings
        tabButtons.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabButtons.forEach(b => {
                    b.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                    b.classList.add('text-gray-400', 'hover:text-white');
                });
                e.currentTarget.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                e.currentTarget.classList.remove('text-gray-400', 'hover:text-white');

                currentStatusFilter = e.currentTarget.getAttribute('data-status');
                currentPage = 1;
                processAndRenderUI();
            });
        });

        if (sortOrder) sortOrder.addEventListener('change', processAndRenderUI);

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                processAndRenderUI();
            }
        });

        nextPageBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(rawItemsList.filter(item => item.calculatedStatus === currentStatusFilter).length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                processAndRenderUI();
            }
        });

        const openSidebarBtn = document.getElementById('openSidebar');
        const closeSidebarBtn = document.getElementById('closeSidebar');
        const sidebarPanel = document.getElementById('sidebarPanel');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        openSidebarBtn.addEventListener('click', () => {
            sidebarPanel.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        });

        function closeMenu() {
            sidebarPanel.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }
        closeSidebarBtn.addEventListener('click', closeMenu);
        sidebarOverlay.addEventListener('click', closeMenu);
    </script>
</body>

</html>
