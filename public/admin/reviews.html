    <script src="./firebase-config.js"></script>
    <script type="module" src="./notifications-manager.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, updateDoc, doc, writeBatch, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 1. Firebase configuration setup (must come first)
        const firebaseConfig = window.FIREBASE_CONFIG || {};

        // 2. Firebase App Initialization (this will follow immediately)
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 3. Root guard mechanism (checks after the app initializes)
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                console.log("Welcome Admin:", user.email);
                const bodyEl = document.getElementById('mainBodyFramework');
                if (bodyEl) {
                    bodyEl.classList.remove('hidden');
                }
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            signOut(auth).catch((error) => console.error("Sign out error:", error));
        });

        //document.getElementById('mainBodyFramework').classList.remove('hidden');

        // Core DOM References (FIXED: references mapping aligned perfectly)
        const reviewsContainer = document.getElementById('reviewsContainer');
        const pendingBadgeCount = document.getElementById('pendingBadgeCount');
        const entryCountText = document.getElementById('entryCountText');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const sortOrder = document.getElementById('sortOrder');
        const btnApproveAll = document.getElementById('btnApproveAll');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');

        // State variables
        let rawItemsList = [];
        let usersMemoryCache = {};
        let clubsMemoryCache = {};
        let currentStatusFilter = 'pending';
        const itemsPerPage = 10;
        let currentPage = 1;

        // Listeners for Caches
        onSnapshot(collection(db, "users"), (snapshot) => {
            snapshot.forEach((docSnap) => {
                usersMemoryCache[docSnap.id] = docSnap.data();
            });
            processAndRenderUI();
        });

        onSnapshot(collection(db, "clubs"), (snapshot) => {
            snapshot.forEach((docSnap) => {
                clubsMemoryCache[docSnap.id] = docSnap.data();
            });
            processAndRenderUI();
        });

        // ========================================================
        // 1. Real-time data listener from Firebase
        // ========================================================
        onSnapshot(collection(db, "reviews"), (snapshot) => {
            rawItemsList = [];
            let pendingCount = 0;
            let activeCount = 0;
            let trashedCount = 0;

            snapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const id = docSnap.id;

                let calculatedStatus = 'pending';
                if (item.isAproved === true || item.isAproved === "true") calculatedStatus = 'approved';
                if (item.isAproved === 'trashed' || item.status === 'trashed') calculatedStatus = 'trashed';

                if (calculatedStatus === 'pending') pendingCount++;
                if (calculatedStatus === 'approved') activeCount++;
                if (calculatedStatus === 'trashed') trashedCount++;

                rawItemsList.push({ id, calculatedStatus, ...item });
            });

            if (pendingBadgeCount) pendingBadgeCount.innerText = pendingCount;
            const activeBadgeCount = document.getElementById('activeBadgeCount');
            if (activeBadgeCount) activeBadgeCount.innerText = activeCount;
            const trashedBadgeCount = document.getElementById('trashedBadgeCount');
            if (trashedBadgeCount) trashedBadgeCount.innerText = trashedCount;
            processAndRenderUI();
        });

        // ========================================================
        // 2. Data filtering, sorting and rendering processes
        // ========================================================
        function processAndRenderUI() {
            let processedList = rawItemsList.filter(item => item.calculatedStatus === currentStatusFilter);

            const order = sortOrder ? sortOrder.value : 'desc';
            processedList.sort((a, b) => {
                let timeA = a.createdTime ? (a.createdTime.toDate ? a.createdTime.toDate().getTime() : new Date(a.createdTime).getTime()) : 0;
                let timeB = b.createdTime ? (b.createdTime.toDate ? b.createdTime.toDate().getTime() : new Date(b.createdTime).getTime()) : 0;
                return order === 'desc' ? timeB - timeA : timeA - timeB;
            });

            const totalItems = processedList.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = processedList.slice(startIndex, endIndex);

            renderReviewsList(paginatedItems, startIndex, totalItems, totalPages);
        }

        // ========================================================
        // 3. Review Card Dynamic Generation Function (Fixed innerHTML crash target)
        // ========================================================
        function renderReviewsList(items, startIndex, totalItems, totalPages) {
            reviewsContainer.innerHTML = '';

            if (items.length === 0) {
                reviewsContainer.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center text-gray-500 text-sm col-span-full">
                        <i class="fa-solid fa-folder-open text-2xl text-gray-700 mb-2 block"></i>
                        No data available in this monitoring tab stream.
                    </div>`;
                entryCountText.innerText = "Showing 0-0 of 0 entries";
                prevPageBtn.disabled = true;
                nextPageBtn.disabled = true;
                return;
            }

            entryCountText.innerText = `Showing ${startIndex + 1}-${Math.min(startIndex + itemsPerPage, totalItems)} of ${totalItems} entries`;
            prevPageBtn.disabled = (currentPage === 1);
            nextPageBtn.disabled = (currentPage === totalPages);

            items.forEach((item) => {
                let userRefStr = item.userRef ? (item.userRef.path || item.userRef.toString()) : "";
                const displayUserId = userRefStr ? userRefStr.split('/').pop() : "";
                const matchedUser = usersMemoryCache[displayUserId] || {};

                const dispName = matchedUser.display_name || matchedUser.name || 'Anonymous User';
                let profilePhoto = matchedUser.profile_photo || matchedUser.photoURL || matchedUser.image || "";

                let avatarHTML = '';
                if (profilePhoto) {
                    avatarHTML = `<img src="${profilePhoto}" alt="User" class="w-10 h-10 rounded-full object-cover border border-gray-700 shadow-sm shrink-0">`;
                } else {
                    const avatarText = dispName.substring(0, 2).toUpperCase();
                    avatarHTML = `<div class="w-10 h-10 bg-indigo-500/10 text-indigo-400 rounded-full flex items-center justify-center font-bold text-sm shrink-0 border border-indigo-500/20 font-mono">
                                    ${avatarText}
                                  </div>`;
                }

                let relativeTime = "Just now";
                if (item.createdTime) {
                    const dateObj = item.createdTime.toDate ? item.createdTime.toDate() : new Date(item.createdTime);
                    relativeTime = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short' }) + ' • ' + dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                }

                let badgeHTML = `<span class="text-[11px] bg-indigo-500/15 text-indigo-400 px-2 py-0.5 rounded-full font-semibold border border-indigo-500/20">System Comment</span>`;
                if (item.rating) {
                    badgeHTML = `
                        <span class="text-[11px] bg-amber-500/15 text-amber-500 px-2 py-0.5 rounded-full font-semibold border border-amber-500/20">
                            <i class="fa-solid fa-star text-[10px] mr-1"></i> ${item.rating}.0 Rating Review
                        </span>`;
                }

                let clubRefStr = item.clubRef ? (item.clubRef.path || item.clubRef.toString()) : "";
                const displayClubId = clubRefStr ? clubRefStr.split('/').pop() : "";
                const matchedClub = clubsMemoryCache[displayClubId] || {};
                const displayClubName = matchedClub.clubName || matchedClub.name || matchedClub.title || displayClubId || 'Global Channel';

                let actionButtonsHTML = '';
                if (item.calculatedStatus === 'pending') {
                    actionButtonsHTML = `
                        <button data-action="approve" data-id="${item.id}" class="action-btn bg-emerald-600/10 hover:bg-emerald-600 text-emerald-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-emerald-500/20 transition flex items-center">
                            <i class="fa-solid fa-circle-check mr-1.5"></i> Approve
                        </button>
                        <button data-action="reject" data-id="${item.id}" class="action-btn bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-rose-500/20 transition flex items-center">
                            <i class="fa-solid fa-trash-can mr-1.5"></i> Move to Trash
                        </button>`;
                } else if (item.calculatedStatus === 'approved') {
                    actionButtonsHTML = `
                        <button data-action="reject" data-id="${item.id}" class="action-btn bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-rose-500/20 transition flex items-center">
                            <i class="fa-solid fa-trash-can mr-1.5"></i> Move to Trash
                        </button>`;
                } else {
                    actionButtonsHTML = `
                        <button data-action="approve" data-id="${item.id}" class="action-btn bg-emerald-600/10 hover:bg-emerald-600 text-emerald-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-emerald-500/20 transition flex items-center">
                            <i class="fa-solid fa-rotate-left mr-1.5"></i> Restore Review
                        </button>`;
                }

                const blockNode = document.createElement('div');
                blockNode.className = "review-card-item bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4";
                blockNode.innerHTML = `
                    <div class="flex items-start space-x-4 text-left w-full">
                        ${avatarHTML}
                        <div class="w-full">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="font-bold text-sm text-gray-200 tracking-wide">${dispName}</span>
                                <span class="text-xs text-gray-500 font-mono" title="${userRefStr}">${displayUserId.substring(0, 10)}...</span>
                                ${badgeHTML}
                                <span class="text-xs text-gray-500 font-mono">• ${relativeTime}</span>
                            </div>
                            <p class="text-xs text-indigo-400 mt-1 font-medium flex items-center">
                                Club Target Context: <span class="underline ml-1" id="club-name-${item.id}">${displayClubName}</span>
                            </p>
                            <p class="text-sm text-gray-300 mt-2 leading-relaxed font-light">${item.reviewText || 'No text review parameter submitted.'}</p>
                        </div>
                    </div>
                    
                    <div class="flex flex-row md:flex-col items-center gap-2 w-full md:w-auto justify-end border-t border-gray-800/60 md:border-none pt-3 md:pt-0 shrink-0">
                        ${actionButtonsHTML}
                    </div>`;
                reviewsContainer.appendChild(blockNode);

                if (!matchedClub.name && !matchedClub.clubName && !matchedClub.title && displayClubId) {
                    getDoc(doc(db, "clubs", displayClubId)).then(docSnap => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            clubsMemoryCache[displayClubId] = data; // store for subsequent renders
                            const nameSpan = document.getElementById(`club-name-${item.id}`);
                            if (nameSpan) {
                                nameSpan.innerText = data.name || data.clubName || data.title || displayClubId;
                            }
                        }
                    }).catch(err => console.error("Error fetching club name:", err));
                }
            });

            bindCardActionListeners();
        }

        function bindCardActionListeners() {
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const docId = e.currentTarget.getAttribute('data-id');
                    const action = e.currentTarget.getAttribute('data-action');
                    const reviewDocRef = doc(db, "reviews", docId);

                    try {
                        if (action === 'approve') {
                            await runTransaction(db, async (transaction) => {
                                const reviewSnap = await transaction.get(reviewDocRef);
                                if (!reviewSnap.exists()) {
                                    throw new Error("Review document does not exist!");
                                }
                                const reviewData = reviewSnap.data();
                                const alreadyApproved = reviewData.isAproved === true || reviewData.isAproved === "true";
                                if (alreadyApproved) {
                                    transaction.update(reviewDocRef, { isAproved: true });
                                    return;
                                }

                                // Perform all reads first
                                let clubSnap = null;
                                let clubDocRef = null;
                                const ratingValue = Number(reviewData.rating);
                                const hasValidRating = reviewData.rating !== undefined && reviewData.rating !== null && !isNaN(ratingValue);

                                if (hasValidRating && reviewData.clubRef) {
                                    const clubRefStr = reviewData.clubRef.path || reviewData.clubRef.toString();
                                    const clubId = clubRefStr.split('/').pop();
                                    if (clubId) {
                                        clubDocRef = doc(db, "clubs", clubId);
                                        clubSnap = await transaction.get(clubDocRef);
                                    }
                                }

                                // Perform all updates/writes last
                                transaction.update(reviewDocRef, { isAproved: true });

                                if (clubSnap && clubSnap.exists() && clubDocRef) {
                                    const clubData = clubSnap.data();
                                    const prevRating = typeof clubData.rating === 'number' ? clubData.rating : 0;
                                    const prevCount = typeof clubData.ratingCount === 'number' ? clubData.ratingCount : 0;

                                    const newCount = prevCount + 1;
                                    const newRating = ((prevRating * prevCount) + ratingValue) / newCount;

                                    transaction.update(clubDocRef, {
                                        rating: Number(newRating.toFixed(2)),
                                        ratingCount: newCount
                                    });
                                }
                            });
                        } else if (action === 'reject') {
                            await runTransaction(db, async (transaction) => {
                                const reviewSnap = await transaction.get(reviewDocRef);
                                if (!reviewSnap.exists()) {
                                    throw new Error("Review document does not exist!");
                                }
                                const reviewData = reviewSnap.data();
                                const prevStatusApproved = reviewData.isAproved === true || reviewData.isAproved === "true";

                                // Perform all reads first
                                let clubSnap = null;
                                let clubDocRef = null;
                                const ratingValue = Number(reviewData.rating);
                                const hasValidRating = reviewData.rating !== undefined && reviewData.rating !== null && !isNaN(ratingValue);

                                if (prevStatusApproved && hasValidRating && reviewData.clubRef) {
                                    const clubRefStr = reviewData.clubRef.path || reviewData.clubRef.toString();
                                    const clubId = clubRefStr.split('/').pop();
                                    if (clubId) {
                                        clubDocRef = doc(db, "clubs", clubId);
                                        clubSnap = await transaction.get(clubDocRef);
                                    }
                                }

                                // Perform all updates/writes last
                                transaction.update(reviewDocRef, { isAproved: 'trashed' });

                                if (clubSnap && clubSnap.exists() && clubDocRef) {
                                    const clubData = clubSnap.data();
                                    const prevRating = typeof clubData.rating === 'number' ? clubData.rating : 0;
                                    const prevCount = typeof clubData.ratingCount === 'number' ? clubData.ratingCount : 0;

                                    if (prevCount > 1) {
                                        const newCount = prevCount - 1;
                                        const newRating = ((prevRating * prevCount) - ratingValue) / newCount;
                                        transaction.update(clubDocRef, {
                                            rating: Number(newRating.toFixed(2)),
                                            ratingCount: newCount
                                        });
                                    } else {
                                        transaction.update(clubDocRef, {
                                            rating: 0,
                                            ratingCount: 0
                                        });
                                    }
                                }
                            });
                        }
                    } catch (err) {
                        console.error("Failed executing state modification: ", err);
                        alert("Error updating review: " + err.message);
                    }
                });
            });
        }

        // Tab Event Target Trigger Binding Matrix
        tabButtons.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabButtons.forEach(b => {
                    b.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                    b.classList.add('text-gray-400', 'hover:text-white');
                });
                e.currentTarget.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                e.currentTarget.classList.remove('text-gray-400', 'hover:text-white');

                currentStatusFilter = e.currentTarget.getAttribute('data-status');
                currentPage = 1;
                processAndRenderUI();
            });
        });

        if (sortOrder) sortOrder.addEventListener('change', processAndRenderUI);

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                processAndRenderUI();
            }
        });

        nextPageBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(rawItemsList.filter(item => item.calculatedStatus === currentStatusFilter).length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                processAndRenderUI();
            }
        });

        if (btnApproveAll) {
            btnApproveAll.addEventListener('click', async () => {
                const pendings = rawItemsList.filter(item => item.calculatedStatus === 'pending');
                if (pendings.length === 0) return alert("No pending records to execute.");

                if (confirm(`Are you sure to approve all ${pendings.length} pending items in batch?`)) {
                    try {
                        await runTransaction(db, async (transaction) => {
                            const clubUpdates = {};
                            const clubsToFetch = new Set();
                            const reviewDataList = [];

                            for (const item of pendings) {
                                const reviewDocRef = doc(db, "reviews", item.id);
                                const reviewSnap = await transaction.get(reviewDocRef);
                                if (reviewSnap.exists()) {
                                    const reviewData = reviewSnap.data();
                                    const alreadyApproved = reviewData.isAproved === true || reviewData.isAproved === "true";
                                    if (!alreadyApproved) {
                                        reviewDataList.push({ ref: reviewDocRef, data: reviewData });
                                        const ratingValue = Number(reviewData.rating);
                                        if (reviewData.rating !== undefined && reviewData.rating !== null && !isNaN(ratingValue)) {
                                            let clubId = "";
                                            if (reviewData.clubRef) {
                                                const clubRefStr = reviewData.clubRef.path || reviewData.clubRef.toString();
                                                clubId = clubRefStr.split('/').pop();
                                            }
                                            if (clubId) {
                                                clubsToFetch.add(clubId);
                                                if (!clubUpdates[clubId]) {
                                                    clubUpdates[clubId] = [];
                                                }
                                                clubUpdates[clubId].push(ratingValue);
                                            }
                                        }
                                    }
                                }
                            }

                            // Fetch current state of unique clubs
                            const clubSnaps = {};
                            for (const clubId of clubsToFetch) {
                                const clubDocRef = doc(db, "clubs", clubId);
                                const clubSnap = await transaction.get(clubDocRef);
                                if (clubSnap.exists()) {
                                    clubSnaps[clubId] = clubSnap.data();
                                }
                            }

                            // Update reviews to approved
                            for (const r of reviewDataList) {
                                transaction.update(r.ref, { isAproved: true });
                            }

                            // Update clubs average ratings and counts
                            for (const clubId in clubUpdates) {
                                const newReviewRatings = clubUpdates[clubId];
                                const clubData = clubSnaps[clubId];
                                if (clubData) {
                                    const prevRating = typeof clubData.rating === 'number' ? clubData.rating : 0;
                                    const prevCount = typeof clubData.ratingCount === 'number' ? clubData.ratingCount : 0;

                                    let totalRatingSum = prevRating * prevCount;
                                    for (const r of newReviewRatings) {
                                        totalRatingSum += r;
                                    }
                                    const newCount = prevCount + newReviewRatings.length;
                                    const newRating = totalRatingSum / newCount;

                                    const clubDocRef = doc(db, "clubs", clubId);
                                    transaction.update(clubDocRef, {
                                        rating: Number(newRating.toFixed(2)),
                                        ratingCount: newCount
                                    });
                                }
                            }
                        });

                        alert("All pending records optimized and approved!");
                    } catch (error) {
                        console.error("Batch update crashed: ", error);
                        alert("Failed to batch approve reviews: " + error.message);
                    }
                }
            });
        }

        const openSidebarBtn = document.getElementById('openSidebar');
        const closeSidebarBtn = document.getElementById('closeSidebar');
        const sidebarPanel = document.getElementById('sidebarPanel');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        openSidebarBtn.addEventListener('click', () => {
            sidebarPanel.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        });

        function closeMenu() {
            sidebarPanel.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }
        closeSidebarBtn.addEventListener('click', closeMenu);
        sidebarOverlay.addEventListener('click', closeMenu);
    </script>
</body>

</html>
