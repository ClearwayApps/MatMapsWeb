<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/image/matMaps_logo.png">
    <title>Login - MatMaps Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            400: '#E63935',
                            500: '#B71C1C',
                            600: '#931A16',
                            700: '#7A1310',
                            800: '#5F0E0B',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-950 text-gray-100 font-sans antialiased flex items-center justify-center min-h-screen p-4">

    <div class="absolute top-0 left-0 w-96 h-96 bg-indigo-800/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-indigo-700/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-2xl relative z-10">

        <div class="flex flex-col items-center mb-8">
            <div class="flex items-center space-x-3 mb-2">
                <img src="../assets/image/matMaps_logo.png" alt="logo" class="h-10" onerror="this.style.display='none'; document.getElementById('logoIcon').classList.remove('hidden')" />
                <i id="logoIcon" class="fa-solid fa-map-location-dot text-3xl text-indigo-400 hidden"></i>
                <span class="text-2xl font-bold text-indigo-400">MatMaps</span>
            </div>
            <p class="text-sm text-gray-400">Welcome back! Please login to your account.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-500">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <input type="email" id="loginEmail" required placeholder="Enter your email address"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg pl-10 pr-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition text-gray-200">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                    <a href="#" class="text-xs text-indigo-400 hover:underline">Forgot Password?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-500">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input id="passwordInput" type="password" required placeholder="Enter your password"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg pl-10 pr-10 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition text-gray-200">
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300">
                        <i class="fa-solid fa-eye" id="passwordIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center">
                <input id="rememberMe" type="checkbox" class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 bg-gray-700 border-gray-600 focus:ring-offset-gray-800">
                <label for="rememberMe" class="ml-2 text-xs text-gray-400 cursor-pointer select-none">Remember this device</label>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-2.5 px-4 rounded-lg transition duration-200 shadow-lg flex items-center justify-center space-x-2">
                <span>Sign In to Dashboard</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-gray-500">
            &copy; 2026 MatMaps Admin Panel. All rights reserved.
        </div>
    </div>

    <script src="./firebase-config.js"></script>
    <script type="module" src="./notifications-manager.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = window.FIREBASE_CONFIG || {};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('passwordInput');
        const submitBtn = document.getElementById('submitBtn');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordIcon = document.getElementById('passwordIcon');

        // সেশন রুট চেক: লগইন করা থাকলে সরাসরি সুরক্ষিত dashboard.html-এ পাঠাবে
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        if (togglePasswordBtn && passwordInput && passwordIcon) {
            togglePasswordBtn.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    passwordIcon.classList.remove('fa-eye');
                    passwordIcon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    passwordIcon.classList.remove('fa-eye-slash');
                    passwordIcon.classList.add('fa-eye');
                }
            });
        }

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                submitBtn.disabled = true;
                submitBtn.innerHTML = `<span>Signing In...</span> <i class="fa-solid fa-spinner fa-spin text-xs"></i>`;

                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    console.log("Logged in successfully:", userCredential.user);
                    // সফল লগইনের পর dashboard.html-এ রিডাইরেক্ট করা হচ্ছে
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    console.error("Authentication Error:", error.code);
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        alert("Invalid email or password. Please try again.");
                    } else if (error.code === 'auth/too-many-requests') {
                        alert("Access locked temporarily due to too many failed attempts. Try again later.");
                    } else {
                        alert("An error occurred during sign in. Check console for details.");
                    }
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<span>Sign In to Dashboard</span> <i class="fa-solid fa-arrow-right text-xs"></i>`;
                }
            });
        }
    </script>
</body>

</html>
